<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nori V2.1 Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..700,70,1&family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #fafcfe;
        font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      textarea {
        font: inherit;
      }

      ::selection {
        background: rgba(214, 255, 0, .45);
        color: #0e0e2c;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: translateY(12px) scale(.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(28px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: .45;
          transform: scale(.96);
        }
        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes checkPop {
        0% {
          transform: scale(.72);
        }
        70% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes successRing {
        from {
          opacity: .7;
          transform: scale(.5);
        }
        to {
          opacity: 0;
          transform: scale(1.7);
        }
      }

      @keyframes prismBorder {
        0%,
        100% {
          filter: saturate(1);
        }
        50% {
          filter: saturate(1.1);
        }
      }

      @keyframes heroHalo {
        from {
          transform: translate3d(-50%, -50%, 0) scale(.94);
          opacity: .36;
        }
        to {
          transform: translate3d(-50%, -50%, 0) scale(1.04);
          opacity: .78;
        }
      }

      @keyframes heroSpark {
        0% {
          opacity: 0;
          transform: translate3d(-50%, -50%, 0) scale(.6) rotate(0deg);
        }
        70% {
          opacity: 1;
          transform: translate3d(var(--burst-x), var(--burst-y), 0) scale(1.04) rotate(var(--burst-r));
        }
        100% {
          opacity: 0;
          transform: translate3d(var(--burst-end-x), var(--burst-end-y), 0) scale(.9) rotate(var(--burst-r));
        }
      }

      @keyframes heroGlint {
        0%,
        100% {
          transform: scale(1) rotate(0deg);
        }
        50% {
          transform: scale(1.2) rotate(10deg);
        }
      }

      @keyframes sloganSoftGlow {
        0%,
        100% {
          filter: brightness(1) saturate(1);
        }
        45% {
          filter: brightness(1.08) saturate(1.18);
        }
        70% {
          filter: brightness(1.02) saturate(1.08);
        }
      }

      @keyframes floatDrift {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes floatDriftReverse {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(8px);
        }
      }

      @keyframes tagGlow {
        0%,
        100% {
          box-shadow: 0 10px 28px rgba(14,14,44,.06), inset 0 1px 0 rgba(255,255,255,.78);
          opacity: .92;
        }
        50% {
          box-shadow: 0 14px 34px rgba(75,77,237,.10), inset 0 1px 0 rgba(255,255,255,.86);
          opacity: 1;
        }
      }

      @keyframes doneButtonReveal {
        0% {
          opacity: 0;
          transform: translateY(8px) scale(.985);
          background-position: 100% 50%;
        }
        55% {
          opacity: 1;
          transform: translateY(0) scale(1.012);
          background-position: 20% 50%;
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          background-position: 0% 50%;
        }
      }

      @keyframes doneButtonGlow {
        0%,
        100% {
          box-shadow: 0 12px 30px rgba(214,255,0,.22);
        }
        50% {
          box-shadow: 0 18px 42px rgba(214,255,0,.42), 0 0 0 5px rgba(214,255,0,.16);
        }
      }

      @keyframes doneButtonSweep {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(120%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="./src/all.compiled.js?v=20260528-flow-detail-polish-5"></script>
  </body>
</html>
