# Copy this file to api_config.yaml or point NORI_CONFIG at a private copy.
# Never commit real API keys. Prefer api_key_env over api_key.

mode: direct

providers:
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  # Local OpenAI-compatible proxy. Start separately before using mode=ghc.
  ghc:
    base_url: http://localhost:8313/v1
    api_key_env: GHC_API_KEY

  # Example relay provider for image generation.
  relay:
    base_url: https://your-relay.example.com/v1
    api_key_env: RELAY_API_KEY

models:
  openai::gpt-5-mini:
    type: llm
    name: GPT-5 Mini
    context_window: 128000
    max_output: 4096
    supports_vision: true
    supports_thinking: true
    temperature_fixed: 1

  ghc::gpt-5-mini:
    type: llm
    name: GHC GPT-5 Mini
    max_output: 4096
    supports_vision: true
    temperature_fixed: 1

  relay::gpt-image-2:
    type: image
    name: Relay GPT Image
    resolution_options:
      - 1072x1440
      - 1024x1024
    # llms.image(reference_images=...) is allowed only when this is true.
    supports_reference_image: true

  relay::video-gen:
    type: video
    name: Relay Video Model
    duration_options:
      - 5
      - 10
    supports_audio: true

active_models:
  direct:
    llm: openai::gpt-5-mini
    vision: openai::gpt-5-mini
    image: relay::gpt-image-2
    video: relay::video-gen
  ghc:
    llm: ghc::gpt-5-mini
    vision: ghc::gpt-5-mini
    image: relay::gpt-image-2
    video: relay::video-gen

evolution:
  default_temperature: 1
