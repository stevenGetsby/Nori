<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nori SVG Architecture Gallery</title>
  <style>
    :root {
      --paper: #f7f2e7;
      --ink: #161512;
      --muted: #625b51;
      --line: rgba(22,21,18,.18);
      --line-strong: rgba(22,21,18,.3);
      --red: #b74336;
      --mono: "SFMono-Regular", "Menlo", monospace;
      --sans: "Avenir Next", "PingFang SC", sans-serif;
      --serif: "Iowan Old Style", "Songti SC", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        linear-gradient(90deg, rgba(22,21,18,.04) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(22,21,18,.04) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(135deg, #fffaf0, var(--paper) 56%, #e6eef0);
    }

    main {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    header {
      border: 1px solid var(--line-strong);
      background: rgba(255,250,240,.82);
      padding: 34px 38px;
      margin-bottom: 26px;
    }

    .kicker {
      font-family: var(--mono);
      color: var(--red);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-family: var(--serif);
      font-size: 56px;
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 850px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .gallery {
      display: grid;
      gap: 24px;
    }

    figure {
      margin: 0;
      border: 1px solid var(--line-strong);
      background: rgba(255,250,240,.78);
      padding: 18px;
      box-shadow: 0 18px 46px rgba(43,35,22,.12);
    }

    figcaption {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding: 0 4px 14px;
      margin-bottom: 18px;
    }

    figcaption strong {
      font-size: 22px;
    }

    figcaption code {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      overflow-wrap: anywhere;
      text-align: right;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      background: #fffaf0;
    }

    @media (max-width: 720px) {
      main { width: min(100% - 24px, 1320px); }
      header { padding: 24px 22px; }
      h1 { font-size: 38px; }
      figcaption { display: grid; }
      figcaption code { text-align: left; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="kicker">Nori SVG diagrams</div>
      <h1>Architecture Gallery</h1>
      <p>五张可独立使用的 SVG：系统总览、代码框架、分层代码架构、业务流程主线、Session/Workflow/Memory 闭环。可直接嵌入文档、wiki、README 或产品说明页。</p>
    </header>

    <section class="gallery">
      <figure>
        <figcaption>
          <strong>System Overview</strong>
          <code>wiki/visuals/svg/nori-system-overview.svg</code>
        </figcaption>
        <img src="svg/nori-system-overview.svg" alt="Nori system overview SVG">
      </figure>
      <figure>
        <figcaption>
          <strong>Code Framework</strong>
          <code>wiki/visuals/svg/nori-code-framework.svg</code>
        </figcaption>
        <img src="svg/nori-code-framework.svg" alt="Nori code framework SVG">
      </figure>
      <figure>
        <figcaption>
          <strong>Layered Code Architecture</strong>
          <code>wiki/visuals/svg/nori-layered-code-architecture.svg</code>
        </figcaption>
        <img src="svg/nori-layered-code-architecture.svg" alt="Nori layered code architecture SVG">
      </figure>
      <figure>
        <figcaption>
          <strong>Business Flow</strong>
          <code>wiki/visuals/svg/nori-business-flow.svg</code>
        </figcaption>
        <img src="svg/nori-business-flow.svg" alt="Nori business flow SVG">
      </figure>
      <figure>
        <figcaption>
          <strong>Session Memory Loop</strong>
          <code>wiki/visuals/svg/nori-session-memory-loop.svg</code>
        </figcaption>
        <img src="svg/nori-session-memory-loop.svg" alt="Nori session memory loop SVG">
      </figure>
    </section>
  </main>
</body>
</html>
