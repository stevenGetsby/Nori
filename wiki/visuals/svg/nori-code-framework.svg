<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Nori code framework architecture</title>
  <desc id="desc">A code-level framework map for Nori showing entrypoints, workflow harness, context, agents, memory, LLM and storage boundaries.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".56" stop-color="#f5ecdc"/>
      <stop offset="1" stop-color="#e8eff1"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161512" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#2b2318" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3e4a51"/>
    </marker>
    <style>
      .title { font: 700 50px "Avenir Next", "PingFang SC", sans-serif; fill: #171512; }
      .subtitle { font: 20px "Avenir Next", "PingFang SC", sans-serif; fill: #615b52; }
      .kicker { font: 700 15px "SFMono-Regular", Menlo, monospace; fill: #b2483d; letter-spacing: 2px; }
      .layer-name { font: 800 25px "Avenir Next", "PingFang SC", sans-serif; fill: #171512; }
      .pkg { font: 700 18px "SFMono-Regular", Menlo, monospace; fill: #253039; }
      .small { font: 15px "Avenir Next", "PingFang SC", sans-serif; fill: #5f594f; }
      .tiny { font: 13px "SFMono-Regular", Menlo, monospace; fill: #6b6459; }
      .rule { font: 700 15px "Avenir Next", "PingFang SC", sans-serif; fill: #253039; }
      .box { stroke: #171512; stroke-opacity: .25; stroke-width: 1.4; rx: 8; }
      .dark { fill: #252c31; stroke: #fffaf0; stroke-opacity: .24; rx: 8; }
      .dark-text { fill: #fffaf0; }
      .dark-small { fill: #d8d0c4; }
      .line { fill: none; stroke: #3e4a51; stroke-width: 2.5; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #3e4a51; stroke-opacity: .55; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#paper)"/>
  <rect width="1600" height="1120" fill="url(#grid)"/>

  <text x="76" y="92" class="kicker">NORI CODE FRAMEWORK / CURRENT TARGET SHAPE</text>
  <text x="76" y="154" class="title">代码 repo 应该按运行职责来理解</text>
  <text x="76" y="194" class="subtitle">左边是入口，中间是 harness/context/agent/memory，右边是外部能力；箭头表达允许的依赖方向，不是 LangGraph 微节点数量。</text>

  <g filter="url(#shadow)">
    <rect x="76" y="250" width="250" height="710" fill="#fffdf7" class="box"/>
    <text x="106" y="292" class="layer-name">Entrypoints</text>
    <text x="106" y="324" class="small">把用户请求变成 session/task/run</text>
    <rect x="106" y="362" width="190" height="78" fill="#f0d1ca" class="box"/>
    <text x="128" y="394" class="pkg">scripts/</text>
    <text x="128" y="420" class="small">smoke, live run, CLI</text>
    <rect x="106" y="462" width="190" height="78" fill="#d8e2ef" class="box"/>
    <text x="128" y="494" class="pkg">wiki/visuals/</text>
    <text x="128" y="520" class="small">architecture maps</text>
    <rect x="106" y="562" width="190" height="78" fill="#d5e7de" class="box"/>
    <text x="128" y="594" class="pkg">data/</text>
    <text x="128" y="620" class="small">samples, local outputs</text>
    <rect x="106" y="662" width="190" height="78" fill="#f0dcae" class="box"/>
    <text x="128" y="694" class="pkg">tests/</text>
    <text x="128" y="720" class="small">contracts, runtime smoke</text>
    <text x="106" y="818" class="rule">入口层规则</text>
    <text x="106" y="850" class="small">不写 domain prompt</text>
    <text x="106" y="876" class="small">不直接操作 provider SDK</text>
    <text x="106" y="902" class="small">只组装配置和触发 runtime</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="395" y="250" width="340" height="154" fill="#dfe3e6" class="box"/>
    <text x="425" y="292" class="layer-name">Harness Layer</text>
    <text x="425" y="326" class="pkg">nori/workflows</text>
    <text x="425" y="356" class="small">WorkflowBase, WorkflowSpec, StageSpec</text>
    <text x="425" y="382" class="small">content_production, LangGraph runner, HumanGate</text>

    <rect x="395" y="448" width="340" height="154" fill="#d8e2ef" class="box"/>
    <text x="425" y="490" class="layer-name">Session Layer</text>
    <text x="425" y="524" class="pkg">nori/sessions</text>
    <text x="425" y="554" class="small">Session, Turn, TaskGoal, SessionEvent</text>
    <text x="425" y="580" class="small">用户连续工作空间与运行恢复</text>

    <rect x="395" y="646" width="340" height="154" fill="#d5e7de" class="box"/>
    <text x="425" y="688" class="layer-name">Context Layer</text>
    <text x="425" y="722" class="pkg">nori/context</text>
    <text x="425" y="752" class="small">ContextCompiler, ContextPack, Resolver</text>
    <text x="425" y="778" class="small">只装配本次 agent call 所需材料</text>

    <rect x="395" y="844" width="340" height="116" fill="#fffdf7" class="box"/>
    <text x="425" y="886" class="layer-name">Core Contracts</text>
    <text x="425" y="920" class="pkg">nori/core</text>
    <text x="425" y="948" class="small">AgentBase, typed models, project aggregate</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="250" width="410" height="710" fill="#fffdf7" class="box"/>
    <text x="830" y="292" class="layer-name">Agent Layer</text>
    <text x="830" y="324" class="small">业务规则、prompt、normalizer、package 都留在各自 agent 内</text>

    <rect x="830" y="362" width="350" height="78" fill="#f0d1ca" class="box"/>
    <text x="852" y="394" class="pkg">nori/agents/user_profiling</text>
    <text x="852" y="420" class="small">intaker, account_planner</text>

    <rect x="830" y="462" width="350" height="78" fill="#d5e7de" class="box"/>
    <text x="852" y="494" class="pkg">nori/agents/market_analysis</text>
    <text x="852" y="520" class="small">xhs_note_analyzer, NoteSkill learning</text>

    <rect x="830" y="562" width="350" height="78" fill="#f0dcae" class="box"/>
    <text x="852" y="594" class="pkg">nori/agents/planning</text>
    <text x="852" y="620" class="small">operation, KPI, calendar planners</text>

    <rect x="830" y="662" width="350" height="98" fill="#ded7ea" class="box"/>
    <text x="852" y="694" class="pkg">nori/agents/content_generation</text>
    <text x="852" y="720" class="small">spec_designer, note_maker, cover_director</text>
    <text x="852" y="746" class="small">content_producer, artifact_generator</text>

    <rect x="830" y="792" width="350" height="78" fill="#dfe3e6" class="box"/>
    <text x="852" y="824" class="pkg">nori/agents/learning_loop</text>
    <text x="852" y="850" class="small">review gate, strategy iteration, capability snapshot</text>

    <text x="830" y="924" class="rule">Agent 层规则</text>
    <text x="830" y="948" class="small">prompt 跟 agent 走；跨 agent 共享只上升到 core/shared</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1275" y="250" width="250" height="710" fill="#252c31" class="dark"/>
    <text x="1305" y="292" class="layer-name dark-text">Infra Layer</text>
    <text x="1305" y="324" class="small dark-small">可替换的外部能力封装</text>

    <rect x="1305" y="362" width="190" height="90" fill="#d8e2ef" class="box"/>
    <text x="1327" y="396" class="pkg">llms/</text>
    <text x="1327" y="422" class="small">chat, json, image</text>

    <rect x="1305" y="486" width="190" height="90" fill="#f0dcae" class="box"/>
    <text x="1327" y="520" class="pkg">nori/storage</text>
    <text x="1327" y="546" class="small">OSS reference publisher</text>

    <rect x="1305" y="610" width="190" height="90" fill="#d5e7de" class="box"/>
    <text x="1327" y="644" class="pkg">nori/shared</text>
    <text x="1327" y="670" class="small">pure helpers only</text>

    <rect x="1305" y="734" width="190" height="90" fill="#f0d1ca" class="box"/>
    <text x="1327" y="768" class="pkg">api_config</text>
    <text x="1327" y="794" class="small">runtime config</text>

    <text x="1305" y="884" class="rule dark-text">Infra 层规则</text>
    <text x="1305" y="912" class="small dark-small">隐藏 provider 细节</text>
    <text x="1305" y="938" class="small dark-small">对 agents 暴露稳定 facade</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="1000" width="1449" height="72" fill="#fffdf7" class="box"/>
    <text x="106" y="1044" class="rule">Legacy removed:</text>
    <text x="246" y="1044" class="tiny">nori/capabilities</text>
    <text x="430" y="1044" class="tiny">nori/core/models.py</text>
    <text x="610" y="1044" class="tiny">nori/skill_base</text>
    <text x="780" y="1044" class="tiny">planning facade compatibility re-export</text>
    <text x="1112" y="1044" class="small">这些路径不再作为新增代码入口。</text>
  </g>

  <path d="M326 401 C360 401 360 327 395 327" class="line"/>
  <path d="M326 500 C356 500 360 525 395 525" class="soft-line"/>
  <path d="M326 601 C356 601 360 723 395 723" class="soft-line"/>
  <path d="M735 327 C770 327 770 401 800 401" class="line"/>
  <path d="M735 525 C770 525 770 501 800 501" class="soft-line"/>
  <path d="M735 723 C770 723 770 711 800 711" class="line"/>
  <path d="M1005 362 C1005 314 1236 314 1275 407" class="line"/>
  <path d="M1180 711 C1238 711 1238 531 1305 531" class="line"/>
  <path d="M830 870 C760 912 724 912 735 902" class="soft-line"/>
</svg>
