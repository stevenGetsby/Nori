<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Nori System Architecture Overview</title>
  <desc id="desc">A layered architecture diagram for Nori showing user interaction, session, information, agent, memory, harness, and external infrastructure layers.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf1; }
      .frame { fill: none; stroke: rgba(22,22,21,.28); stroke-width: 2; }
      .title { font: 700 42px "Avenir Next", "PingFang SC", sans-serif; fill: #161615; }
      .subtitle { font: 18px "Avenir Next", "PingFang SC", sans-serif; fill: #615b52; }
      .label { font: 700 22px "Avenir Next", "PingFang SC", sans-serif; fill: #161615; }
      .small { font: 16px "Avenir Next", "PingFang SC", sans-serif; fill: #615b52; }
      .mono { font: 14px "SFMono-Regular", Menlo, monospace; fill: #615b52; }
      .arrow { stroke: #3f4953; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4953"/>
    </marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#161615" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2318" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <path d="M0 0H1400V900H0Z" fill="url(#grid)"/>
  <rect class="frame" x="38" y="38" width="1324" height="824"/>

  <text class="title" x="80" y="104">Nori System Architecture Overview</text>
  <text class="subtitle" x="80" y="138">Domain agents own business decisions. Harness owns execution. Context assembles a call. Memory survives sessions. Infra connects external services.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="190" width="1180" height="84" fill="#f0d1ca" stroke="#b2483d" stroke-width="2"/>
    <text class="label" x="145" y="226">User Interaction Layer</text>
    <text class="small" x="145" y="252">brief, assets, constraints, decisions, publish intent, human approval</text>
    <text class="mono" x="970" y="242">CLI / scripts / future UI</text>

    <rect x="110" y="310" width="1180" height="84" fill="#d8e2ef" stroke="#315f95" stroke-width="2"/>
    <text class="label" x="145" y="346">Session Layer</text>
    <text class="small" x="145" y="372">Session, Turn, TaskGoal, SessionEvent, RuntimeRunRecorder</text>
    <text class="mono" x="962" y="362">nori/sessions</text>

    <rect x="110" y="430" width="1180" height="96" fill="#d5e7de" stroke="#26745e" stroke-width="2"/>
    <text class="label" x="145" y="468">Information Layer</text>
    <text class="small" x="145" y="494">ContextCompiler builds ContextPack; ContextResolver projects ContextView for each agent</text>
    <text class="mono" x="964" y="482">nori/context</text>

    <rect x="110" y="562" width="1180" height="124" fill="#f0dcae" stroke="#a87422" stroke-width="2"/>
    <text class="label" x="145" y="600">Agent Layer</text>
    <text class="small" x="145" y="626">UserProfiling, MarketAnalysis, Planning, ContentGeneration, LearningLoop</text>
    <text class="small" x="145" y="654">Prompts, policies, normalizers, package builders, cover direction, review logic</text>
    <text class="mono" x="972" y="626">nori/agents/*</text>

    <rect x="110" y="724" width="360" height="94" fill="#ded7ea" stroke="#675492" stroke-width="2"/>
    <text class="label" x="142" y="762">Memory Layer</text>
    <text class="small" x="142" y="790">stable/session/task memory, retrieval, promotion</text>

    <rect x="520" y="724" width="360" height="94" fill="#dfe3e6" stroke="#3f4953" stroke-width="2"/>
    <text class="label" x="552" y="762">Harness Layer</text>
    <text class="small" x="552" y="790">LangGraph coarse stages, HumanGateSpec, run records</text>

    <rect x="930" y="724" width="360" height="94" fill="#e8ddf2" stroke="#675492" stroke-width="2"/>
    <text class="label" x="962" y="762">External Infra</text>
    <text class="small" x="962" y="790">LLM gateway, image providers, OSS storage</text>
  </g>

  <path class="arrow" d="M700 274V310"/>
  <path class="arrow" d="M700 394V430"/>
  <path class="arrow" d="M700 526V562"/>
  <path class="arrow" d="M290 686V724"/>
  <path class="arrow" d="M700 686V724"/>
  <path class="arrow" d="M1110 686V724"/>
</svg>
